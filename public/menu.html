<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Menü</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#12151a" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#fef7ee',
              100: '#fdedd6',
              200: '#fad7ac',
              300: '#f6ba77',
              400: '#f19340',
              500: '#ed751a',
              600: '#de5b10',
              700: '#b84410',
              800: '#933715',
              900: '#772f14',
              950: '#401508',
            },
            surface: {
              850: '#1a1d21',
              900: '#12151a',
              950: '#0c0e11',
            },
          },
          animation: {
            'modal-in': 'modalIn 0.25s ease-out',
            'cart-bounce': 'cartBounce 0.4s ease',
          },
          keyframes: {
            modalIn: {
              '0%': { opacity: '0', transform: 'scale(0.96)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            cartBounce: {
              '0%, 100%': { transform: 'scale(1)' },
              '50%': { transform: 'scale(1.08)' },
            },
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .safe-area-pb { padding-bottom: max(0.75rem, env(safe-area-inset-bottom)); }
  </style>
</head>
<body class="font-sans antialiased bg-stone-50 text-stone-900 min-h-screen pb-24">
  <div id="app" x-data="menuApp()" x-init="init()" class="min-h-screen">
    <!-- HEADER -->
    <header class="sticky top-0 z-40 bg-surface-900/95 backdrop-blur-md border-b border-white/5 shadow-lg">
      <div class="max-w-2xl mx-auto px-4 py-3 flex items-center gap-3">
        <img
          :src="restaurant.logo || ''"
          alt="Logo"
          class="w-11 h-11 rounded-xl object-cover ring-2 ring-white/10 shadow"
          x-show="restaurant.logo"
        />
        <span x-show="!restaurant.logo" class="w-11 h-11 rounded-xl bg-white/10 flex items-center justify-center text-2xl">🍽️</span>
        <h1 class="text-lg font-semibold text-white tracking-tight" x-text="restaurant.name"></h1>
      </div>
    </header>

    <!-- YATAY KATEGORİ MENÜSÜ -->
    <nav class="sticky top-[60px] z-30 bg-stone-50/95 backdrop-blur-sm border-b border-stone-200/80 shadow-sm">
      <div class="max-w-2xl mx-auto px-2 py-2">
        <div class="flex gap-2 overflow-x-auto scrollbar-hide pb-1 -mx-2 px-2" style="scrollbar-width: none; -ms-overflow-style: none;">
          <template x-for="cat in categories" :key="cat.id">
            <button
              :id="'nav-' + cat.id"
              type="button"
              @click="setActiveCategory(cat.id)"
              :class="activeCategory === cat.id
                ? 'bg-surface-900 text-white shadow-md'
                : 'bg-white text-stone-600 border border-stone-200 hover:border-stone-300'"
              class="shrink-0 px-4 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 whitespace-nowrap"
            >
              <span x-text="cat.name"></span>
            </button>
          </template>
        </div>
      </div>
    </nav>

    <!-- ÜRÜN LİSTESİ -->
    <main class="max-w-2xl mx-auto px-4 py-6">
      <template x-for="cat in categories" :key="'section-' + cat.id">
        <section
          :id="'cat-' + cat.id"
          x-intersect:enter.threshold.0.2="activeCategory = cat.id"
          class="scroll-mt-32"
        >
          <h2 class="text-xs font-semibold uppercase tracking-wider text-stone-400 mb-3 px-0.5" x-text="cat.name"></h2>
          <template x-if="loading">
            <div class="space-y-4">
              <template x-for="i in 3" :key="i">
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-stone-100 animate-pulse">
                  <div class="h-44 bg-stone-200"></div>
                  <div class="p-4 space-y-2">
                    <div class="h-5 bg-stone-200 rounded w-3/4"></div>
                    <div class="h-4 bg-stone-100 rounded w-full"></div>
                    <div class="h-4 bg-stone-100 rounded w-1/2"></div>
                    <div class="h-10 bg-stone-200 rounded-xl w-28 mt-3"></div>
                  </div>
                </div>
              </template>
            </div>
          </template>
          <div x-show="!loading" class="space-y-4" :class="loading ? 'hidden' : ''">
            <template x-for="product in filteredProducts(cat.id)" :key="product.id">
              <article
                class="bg-white rounded-2xl overflow-hidden shadow-sm border border-stone-100 hover:shadow-md hover:border-stone-200/80 transition-all duration-300 active:scale-[0.99]"
              >
                <button type="button" @click="openModal(product)" class="block w-full text-left">
                  <div class="aspect-[4/3] overflow-hidden bg-stone-100">
                    <img
                      x-show="product.image"
                      :src="product.image"
                      :alt="product.name"
                      class="w-full h-full object-cover transition-transform duration-500 hover:scale-105"
                      loading="lazy"
                    />
                    <div x-show="!product.image" class="w-full h-full flex items-center justify-center text-4xl">🍽️</div>
                  </div>
                  <div class="p-4">
                    <h3 class="font-semibold text-stone-900 text-base mb-1" x-text="product.name"></h3>
                    <p class="text-sm text-stone-500 line-clamp-2 mb-3" x-text="product.description || ''"></p>
                    <div class="flex items-center justify-between">
                      <span class="text-lg font-bold text-brand-600" x-text="product.price + '₺'"></span>
                      <span class="text-sm font-medium text-brand-600">Detay →</span>
                    </div>
                  </div>
                </button>
                <div class="px-4 pb-4">
                  <button
                    type="button"
                    @click.stop="addToCartQuick(product)"
                    class="w-full py-3 rounded-xl bg-surface-900 text-white text-sm font-semibold hover:bg-surface-850 active:scale-[0.98] transition-all duration-200"
                  >
                    Sepete ekle
                  </button>
                </div>
              </article>
            </template>
          </div>
        </section>
      </template>
    </main>

    <!-- ÜRÜN DETAY MODALI -->
    <div
      x-show="modalOpen"
      x-transition:enter="ease-out duration-200"
      x-transition:enter-start="opacity-0"
      x-transition:enter-end="opacity-100"
      x-transition:leave="ease-in duration-150"
      x-transition:leave-start="opacity-100"
      x-transition:leave-end="opacity-0"
      class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 bg-black/50 backdrop-blur-sm"
      @click.self="closeModal()"
    >
      <div
        x-show="modalOpen"
        x-transition:enter="ease-out duration-200"
        x-transition:enter-start="opacity-0 translate-y-full sm:translate-y-0 sm:scale-95"
        x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
        x-transition:leave="ease-in duration-150"
        class="w-full max-w-lg max-h-[90vh] overflow-hidden bg-white rounded-t-3xl sm:rounded-2xl shadow-2xl flex flex-col animate-modal-in"
        @click.stop
      >
        <template x-if="modalProduct">
          <div class="overflow-y-auto flex-1">
            <div class="aspect-[4/3] bg-stone-100 shrink-0">
              <img x-show="modalProduct.image" :src="modalProduct.image" :alt="modalProduct.name" class="w-full h-full object-cover" />
              <div x-show="!modalProduct.image" class="w-full h-full flex items-center justify-center text-5xl">🍽️</div>
            </div>
            <div class="p-5 pb-8">
              <h3 class="text-xl font-bold text-stone-900 mb-1" x-text="modalProduct.name"></h3>
              <p class="text-stone-500 text-sm mb-4" x-text="modalProduct.description || ''"></p>
              <p class="text-lg font-bold text-brand-600 mb-5" x-text="modalProduct.price + '₺'"></p>

              <template x-if="modalProduct.ingredientIds && modalProduct.ingredientIds.length">
                <div class="mb-5">
                  <h4 class="text-sm font-semibold text-stone-700 mb-2">Çıkarılabilecekler</h4>
                  <div class="flex flex-wrap gap-2">
                    <template x-for="ingId in modalProduct.ingredientIds" :key="ingId">
                      <button
                        type="button"
                        @click="toggleRemove(ingId)"
                        :class="modalRemoves.includes(ingId) ? 'bg-brand-500 text-white border-brand-500' : 'bg-stone-100 text-stone-600 border-stone-200 hover:bg-stone-200'"
                        class="px-3 py-1.5 rounded-lg text-sm font-medium border transition-colors"
                      >
                        <span x-text="getIngredientName(ingId)"></span>
                        <span x-show="modalRemoves.includes(ingId)"> ✓</span>
                      </button>
                    </template>
                  </div>
                </div>
              </template>

              <template x-if="modalProduct.extraIds && modalProduct.extraIds.length">
                <div class="mb-6">
                  <h4 class="text-sm font-semibold text-stone-700 mb-2">Extra</h4>
                  <div class="space-y-2">
                    <template x-for="exId in modalProduct.extraIds" :key="exId">
                      <label class="flex items-center justify-between p-3 rounded-xl border cursor-pointer transition-colors"
                        :class="modalExtras[exId] ? 'border-brand-500 bg-brand-50' : 'border-stone-200 hover:bg-stone-50'">
                        <span class="font-medium text-stone-800" x-text="getExtra(modalProduct, exId)?.name"></span>
                        <div class="flex items-center gap-2">
                          <span class="text-sm text-brand-600 font-semibold" x-text="'+' + (getExtra(modalProduct, exId)?.price || 0) + '₺'"></span>
                          <input type="checkbox" x-model="modalExtras[exId]" class="rounded border-stone-300 text-brand-600 focus:ring-brand-500" />
                        </div>
                      </label>
                    </template>
                  </div>
                </div>
              </template>

              <button
                type="button"
                @click="addToCartFromModal()"
                class="w-full py-4 rounded-xl bg-surface-900 text-white font-semibold hover:bg-surface-850 active:scale-[0.98] transition-all duration-200"
              >
                Sepete ekle
              </button>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- STICKY SEPET BAR -->
    <div
      x-show="checkoutStep === 'cart' && cart.length > 0"
      x-transition:enter="ease-out duration-300"
      x-transition:leave="ease-in duration-200"
      class="fixed bottom-0 left-0 right-0 z-40 bg-white border-t border-stone-200 shadow-[0_-4px_24px_rgba(0,0,0,0.08)] safe-area-pb"
    >
      <div class="max-w-2xl mx-auto px-4 py-3 flex items-center gap-4">
        <div class="flex items-center gap-2 min-w-0">
          <span
            class="flex items-center justify-center w-10 h-10 rounded-xl bg-surface-900 text-white font-bold text-sm"
            :class="{ 'animate-cart-bounce': addToCartBounce }"
            x-text="cartCount()"
          ></span>
          <span class="text-stone-500 text-sm truncate" x-text="cartCount() + ' ürün'"></span>
        </div>
        <div class="flex-1 text-right">
          <span class="text-xl font-bold text-stone-900" x-text="cartTotal() + '₺'"></span>
        </div>
        <button
          type="button"
          @click="startCheckout()"
          class="shrink-0 px-6 py-3 rounded-xl bg-brand-500 text-white font-semibold hover:bg-brand-600 active:scale-[0.98] transition-all duration-200 shadow-lg shadow-brand-500/25"
        >
          Siparişi tamamla
        </button>
      </div>
    </div>

    <!-- CHECKOUT OVERLAY -->
    <div
      x-show="checkoutStep !== 'cart'"
      x-transition:enter="ease-out duration-200"
      x-transition:enter-start="opacity-0"
      x-transition:enter-end="opacity-100"
      class="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-4"
      @click.self="backToCart()"
    >
      <div
        x-show="checkoutStep === 'mode'"
        x-transition
        class="w-full max-w-lg bg-white rounded-t-3xl sm:rounded-2xl shadow-2xl p-6 pb-8 safe-area-pb"
        @click.stop
      >
        <h3 class="text-lg font-bold text-stone-900 mb-4">Sipariş türü</h3>
        <div class="space-y-3">
          <button
            type="button"
            @click="setOrderMode('in')"
            class="w-full p-4 rounded-xl border-2 border-stone-200 hover:border-brand-500 hover:bg-brand-50 text-left font-medium text-stone-800 transition-colors"
          >
            Restoran içi — Masa <span x-text="restaurant.tableNumber || '—'"></span>
          </button>
          <button
            type="button"
            @click="setOrderMode('out')"
            class="w-full p-4 rounded-xl border-2 border-stone-200 hover:border-brand-500 hover:bg-brand-50 text-left font-medium text-stone-800 transition-colors"
          >
            Paket / Restoran dışı
          </button>
        </div>
        <button type="button" @click="backToCart()" class="mt-4 w-full py-3 text-stone-500 font-medium">
          ← Sepete dön
        </button>
      </div>

      <div
        x-show="checkoutStep === 'form'"
        x-transition
        class="w-full max-w-lg bg-white rounded-t-3xl sm:rounded-2xl shadow-2xl p-6 pb-8 max-h-[90vh] overflow-y-auto safe-area-pb"
        @click.stop
      >
        <h3 class="text-lg font-bold text-stone-900 mb-4">İletişim bilgileri</h3>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-stone-700 mb-1">Ad Soyad</label>
            <input
              type="text"
              x-model="customer.name"
              placeholder="Adınız"
              class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 outline-none transition"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-stone-700 mb-1">Telefon</label>
            <input
              type="tel"
              x-model="customer.phone"
              placeholder="05XX XXX XX XX"
              class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 outline-none transition"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-stone-700 mb-1">Adres</label>
            <textarea
              x-model="customer.address"
              placeholder="Teslimat adresi"
              rows="3"
              class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 outline-none transition resize-none"
            ></textarea>
          </div>
        </div>
        <button
          type="button"
          @click="submitCustomerForm()"
          class="mt-6 w-full py-4 rounded-xl bg-surface-900 text-white font-semibold hover:bg-surface-850"
        >
          Devam et
        </button>
        <button type="button" @click="backToMode()" class="mt-3 w-full py-2 text-stone-500 font-medium text-sm">
          ← Geri
        </button>
      </div>

      <div
        x-show="checkoutStep === 'summary'"
        x-transition
        class="w-full max-w-lg bg-white rounded-t-3xl sm:rounded-2xl shadow-2xl p-6 pb-8 max-h-[90vh] overflow-y-auto safe-area-pb"
        @click.stop
      >
        <h3 class="text-lg font-bold text-stone-900 mb-4">Sipariş özeti</h3>
        <template x-if="orderMode === 'in'">
          <p class="text-stone-600 text-sm mb-4">Masa: <span x-text="restaurant.tableNumber || '—'"></span></p>
        </template>
        <template x-if="orderMode === 'out'">
          <div class="text-sm text-stone-600 mb-4 space-y-1">
            <p>Ad: <span x-text="customer.name"></span></p>
            <p>Telefon: <span x-text="customer.phone"></span></p>
            <p>Adres: <span x-text="customer.address"></span></p>
          </div>
        </template>
        <ul class="border-t border-stone-200 pt-4 space-y-2 mb-4">
          <template x-for="(item, idx) in cart" :key="idx">
            <li class="flex justify-between text-sm">
              <span>
                <span x-text="item.qty + 'x ' + item.product.name"></span>
                <template x-if="item.removes && item.removes.length">
                  <span class="text-stone-400 block text-xs" x-text="'- ' + item.removes.join(', ')"></span>
                </template>
                <template x-if="item.extras && item.extras.length">
                  <span class="text-brand-600 block text-xs" x-text="'+ ' + item.extras.map(e => e.name).join(', ')"></span>
                </template>
              </span>
              <span class="font-medium" x-text="(item.product.price * item.qty + (item.extras || []).reduce((s,e) => s + e.price * item.qty, 0)) + '₺'"></span>
            </li>
          </template>
        </ul>
        <p class="text-right font-bold text-lg text-stone-900 mb-6">Toplam: <span x-text="cartTotal() + '₺'"></span></p>
        <button
          type="button"
          @click="sendWhatsApp()"
          class="flex items-center justify-center gap-2 w-full py-4 rounded-xl bg-[#25D366] text-white font-semibold hover:bg-[#20BD5A] active:scale-[0.98] transition-all"
        >
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          WhatsApp ile gönder
        </button>
        <button type="button" @click="backToCart()" class="mt-3 w-full py-2 text-stone-500 font-medium text-sm">
          ← Sepete dön
        </button>
      </div>
    </div>
  </div>

  <script src="/menu.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
</body>
</html>
