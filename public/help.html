<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yardım - MeraPaket</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(180deg, #0a0a0f 0%, #141419 100%);
      color: #f8fafc;
      padding: 28px 24px;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      line-height: 1.6;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 24px; letter-spacing: -0.02em; }
    .info {
      background: linear-gradient(135deg, #141419 0%, #1c1c24 100%);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid #2a2a36;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .info h3 { color: #10b981; margin-bottom: 8px; font-size: 0.95rem; font-weight: 600; }
    .info p { color: #a1a1aa; font-size: 0.95rem; }
  </style>
</head>
<body>
  <h1>ℹ️ Yardım</h1>
  <div class="info">
    <h3>📍 Adres</h3>
    <p id="address">-</p>
  </div>
  <div class="info">
    <h3>📞 Telefon</h3>
    <p id="phone">-</p>
  </div>
  <div class="info">
    <h3>🕐 Çalışma Saatleri</h3>
    <p id="hours">-</p>
  </div>
  <script>
    fetch('/api/restaurant').then(r => r.json()).then(d => {
      document.getElementById('address').textContent = d.address || '-';
      document.getElementById('phone').textContent = d.phone || '-';
      document.getElementById('hours').textContent = d.hours || '-';
    }).catch(() => {});
  </script>
</body>
</html>
