<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - MeraPaket</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #09090b;
      --surface: #18181b;
      --surface-2: #1f1f23;
      --border: #27272a;
      --accent: #22c55e;
      --accent-dim: rgba(34, 197, 94, 0.12);
      --muted: #71717a;
      --text: #fafafa;
    }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .layout {
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      flex-shrink: 0;
    }
    .sidebar-logo {
      padding: 0 20px 24px;
      font-size: 1.25rem;
      font-weight: 700;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      color: var(--muted);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
    }
    .nav-item:hover { color: var(--text); background: var(--surface-2); }
    .nav-item.active { color: var(--accent); background: var(--accent-dim); }
    .main {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }
    .section { display: none; }
    .section.active { display: block; }
    .section-header {
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .section-title { font-size: 1.5rem; font-weight: 700; }
    .card {
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 24px;
      margin-bottom: 20px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .stat-value { font-size: 1.75rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
    .order-card {
      background: var(--bg);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .order-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .order-id { font-weight: 700; color: var(--accent); }
    .order-time { font-size: 0.8rem; color: var(--muted); }
    .order-items { color: #a1a1aa; font-size: 0.9rem; margin-bottom: 6px; }
    .order-meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 10px; }
    .order-footer { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .badge { font-size: 0.7rem; padding: 4px 8px; background: var(--border); border-radius: 6px; color: #a1a1aa; }
    select {
      padding: 6px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      margin-left: auto;
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; }
    input, textarea {
      width: 100%;
      padding: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); }
    .btn {
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { filter: brightness(1.1); }
    .category-block {
      background: var(--bg);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    .category-block h3 { font-size: 1rem; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .product-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .product-row:last-child { border-bottom: none; }
    .product-row input { flex: 2; }
    .product-row input[type="number"] { flex: 0.5; }
    .coupon-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .coupon-row input { flex: 1; min-width: 100px; }
    .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
    .last-update { font-size: 0.75rem; color: var(--muted); margin-top: 16px; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">🍽️ MeraPaket</div>
      <nav>
        <a class="nav-item active" data-tab="orders">📋 Siparişler</a>
        <a class="nav-item" data-tab="menu">🍴 Menü</a>
        <a class="nav-item" data-tab="restaurant">⚙️ Restoran</a>
        <a class="nav-item" data-tab="stats">📊 İstatistik</a>
      </nav>
    </aside>
    <main class="main">
      <section id="section-orders" class="section active">
        <div class="section-header">
          <h1 class="section-title">Siparişler</h1>
          <div style="display:flex;gap:8px">
            <select id="filter-status" onchange="loadOrders()" style="padding:8px 12px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text)">
              <option value="">Tümü</option>
              <option value="Alındı">Alındı</option>
              <option value="Hazırlanıyor">Hazırlanıyor</option>
              <option value="Hazır">Hazır</option>
              <option value="Yola Çıktı">Yola Çıktı</option>
              <option value="Teslim Edildi">Teslim Edildi</option>
              <option value="İptal">İptal</option>
            </select>
            <button class="btn btn-primary" onclick="window.print()">🖨️ Yazdır</button>
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat"><div class="stat-value" id="today-count">0</div><div class="stat-label">Bugün</div></div>
          <div class="stat"><div class="stat-value" id="today-total">0₺</div><div class="stat-label">Bugün Toplam</div></div>
          <div class="stat"><div class="stat-value" id="active-count">0</div><div class="stat-label">Aktif</div></div>
        </div>
        <div id="orders-list"></div>
        <div class="last-update" id="orders-update">Son güncelleme: -</div>
      </section>

      <section id="section-menu" class="section">
        <div class="section-header">
          <h1 class="section-title">Menü Yönetimi</h1>
          <button class="btn btn-primary" onclick="saveMenu()">Kaydet</button>
        </div>
        <div id="menu-editor"></div>
      </section>

      <section id="section-restaurant" class="section">
        <div class="section-header">
          <h1 class="section-title">Restoran Ayarları</h1>
          <button class="btn btn-primary" onclick="saveRestaurant()">Kaydet</button>
        </div>
        <div class="card">
          <div class="form-grid">
            <div class="form-group"><label>Restoran Adı</label><input type="text" id="r-name"></div>
            <div class="form-group"><label>Telefon</label><input type="text" id="r-phone"></div>
            <div class="form-group" style="grid-column:1/-1"><label>Adres</label><input type="text" id="r-address"></div>
            <div class="form-group"><label>Açılış (HH:mm)</label><input type="text" id="r-hoursOpen" placeholder="10:00"></div>
            <div class="form-group"><label>Kapanış (HH:mm)</label><input type="text" id="r-hoursClose" placeholder="23:00"></div>
            <div class="form-group"><label>Min. Sipariş (₺)</label><input type="number" id="r-minOrder" min="0" placeholder="30"></div>
            <div class="form-group"><label>Tahmini teslimat (dk)</label><input type="number" id="r-estMinutes" min="5" placeholder="25"></div>
          </div>
          <div class="form-group" style="margin-top:24px">
            <label>Kuponlar</label>
            <div id="coupons-list"></div>
            <button class="btn" style="margin-top:12px;background:var(--surface-2);color:var(--text)" onclick="addCoupon()">+ Kupon Ekle</button>
          </div>
        </div>
      </section>

      <section id="section-stats" class="section">
        <div class="section-header">
          <h1 class="section-title">İstatistikler</h1>
        </div>
        <div class="stats-grid">
          <div class="stat"><div class="stat-value" id="stat-total-orders">0</div><div class="stat-label">Toplam Sipariş</div></div>
          <div class="stat"><div class="stat-value" id="stat-total-revenue">0₺</div><div class="stat-label">Toplam Ciro</div></div>
          <div class="stat"><div class="stat-value" id="stat-today-orders">0</div><div class="stat-label">Bugün Sipariş</div></div>
          <div class="stat"><div class="stat-value" id="stat-today-revenue">0₺</div><div class="stat-label">Bugün Ciro</div></div>
          <div class="stat"><div class="stat-value" id="stat-favorites">0</div><div class="stat-label">Favori</div></div>
        </div>
        <div class="card">
          <h3 style="margin-bottom:16px">Sipariş Durumları</h3>
          <div id="status-breakdown"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    let orders = [], menuData = {}, restaurantData = {}, favorites = [];

    document.querySelectorAll('.nav-item').forEach(n => {
      n.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.section').forEach(x => x.classList.remove('active'));
        n.classList.add('active');
        document.getElementById('section-' + n.dataset.tab).classList.add('active');
        if (n.dataset.tab === 'stats') loadStats();
        if (n.dataset.tab === 'menu') loadMenuEditor();
        if (n.dataset.tab === 'restaurant') loadRestaurantForm();
      });
    });

    function formatDate(iso) {
      return new Date(iso).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
    }
    function isToday(iso) {
      return new Date(iso).toDateString() === new Date().toDateString();
    }

    let lastOrderCount = 0;
    const playNewOrderSound = () => {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = 800; g.gain.setValueAtTime(0.3, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
        o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.2);
      } catch (_) {}
    };

    async function loadOrders() {
      try {
        const r = await fetch('/api/orders');
        const d = await r.json();
        const prevCount = orders.length;
        orders = d.orders || [];
        if (orders.length > prevCount && prevCount > 0) playNewOrderSound();
        const statusFilter = document.getElementById('filter-status')?.value || '';
        let filtered = orders;
        if (statusFilter) filtered = orders.filter(o => o.status === statusFilter);
        const today = orders.filter(o => isToday(o.createdAt));
        document.getElementById('today-count').textContent = today.length;
        document.getElementById('today-total').textContent = today.reduce((s, o) => s + o.total, 0) + '₺';
        document.getElementById('active-count').textContent = orders.filter(o => o.status !== 'Teslim Edildi' && o.status !== 'İptal').length;
        document.getElementById('orders-update').textContent = 'Son güncelleme: ' + new Date().toLocaleTimeString('tr-TR');

        const statuses = ['Alındı', 'Hazırlanıyor', 'Hazır', 'Yola Çıktı', 'Teslim Edildi', 'İptal'];
        const el = document.getElementById('orders-list');
        if (!filtered.length) {
          el.innerHTML = '<div class="empty">Sipariş yok</div>';
          return;
        }
        el.innerHTML = filtered.map(o => `
          <div class="order-card">
            <div class="order-row">
              <span class="order-id">${o.id}</span>
              <span class="order-time">${formatDate(o.createdAt)}</span>
            </div>
            <div class="order-items">${o.items}</div>
            <div class="order-meta">📍 ${o.address}${o.notes ? ' · 📝 ' + o.notes : ''}</div>
            <div class="order-footer">
              <span class="stat-value" style="font-size:1rem">${o.total}₺</span>
              <span class="badge">${o.orderType === 'restoran' ? '🏠' : '📦'}</span>
              <span class="badge">${(o.paymentMethod || 'kapida_nakit') === 'kapida_pos' ? '💳' : '💵'}</span>
              <select onchange="updateStatus(${o.id}, this.value)">
                ${statuses.map(s => `<option ${o.status === s ? 'selected' : ''}>${s}</option>`).join('')}
              </select>
            </div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('orders-list').innerHTML = '<div class="empty">Bağlantı hatası</div>';
      }
    }

    async function updateStatus(id, status) {
      await fetch(`/api/orders/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      loadOrders();
    }

    async function loadMenuEditor() {
      try {
        const r = await fetch('/api/menu');
        menuData = await r.json();
        const cats = menuData.categories || [];
        const el = document.getElementById('menu-editor');
        el.innerHTML = cats.map((cat, ci) => `
          <div class="category-block">
            <h3>${cat.icon || '🍽️'} ${cat.name}</h3>
            ${(cat.products || []).map((p, pi) => `
              <div class="product-row">
                <input type="text" value="${(p.name || '').replace(/"/g, '&quot;')}" onchange="setProduct(${ci},${pi},'name',this.value)" placeholder="Ürün adı">
                <input type="number" value="${p.price || 0}" min="0" onchange="setProduct(${ci},${pi},'price',this.value)" placeholder="₺">
                <button class="btn" style="background:#dc2626;color:#fff;padding:6px 10px" onclick="removeProduct(${ci},${pi})">Sil</button>
              </div>
            `).join('')}
            <button class="btn" style="margin-top:8px;background:var(--accent-dim);color:var(--accent)" onclick="addProduct(${ci})">+ Ürün Ekle</button>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('menu-editor').innerHTML = '<div class="empty">Menü yüklenemedi</div>';
      }
    }

    function setProduct(ci, pi, field, val) {
      if (!menuData.categories) return;
      const p = menuData.categories[ci]?.products?.[pi];
      if (p) p[field] = field === 'price' ? Number(val) || 0 : val;
    }
    function addProduct(ci) {
      if (!menuData.categories) return;
      const cat = menuData.categories[ci];
      if (!cat.products) cat.products = [];
      cat.products.push({ id: 'new-' + Date.now(), name: 'Yeni Ürün', price: 0, image: '' });
      loadMenuEditor();
    }
    function removeProduct(ci, pi) {
      if (!menuData.categories) return;
      menuData.categories[ci].products?.splice(pi, 1);
      loadMenuEditor();
    }

    async function saveMenu() {
      try {
        const r = await fetch('/api/menu', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(menuData)
        });
        const d = await r.json();
        alert(d.ok ? 'Menü kaydedildi.' : (d.error || 'Hata'));
      } catch (e) { alert('Kayıt başarısız'); }
    }

    async function loadRestaurantForm() {
      try {
        const r = await fetch('/api/restaurant');
        restaurantData = await r.json();
        document.getElementById('r-name').value = restaurantData.name || '';
        document.getElementById('r-address').value = restaurantData.address || '';
        document.getElementById('r-phone').value = restaurantData.phone || '';
        document.getElementById('r-hoursOpen').value = restaurantData.hoursOpen || '10:00';
        document.getElementById('r-hoursClose').value = restaurantData.hoursClose || '23:00';
        document.getElementById('r-minOrder').value = restaurantData.minOrderAmount || 30;
        document.getElementById('r-estMinutes').value = restaurantData.estimatedMinutes || 25;
        const coupons = restaurantData.coupons || [];
        const cl = document.getElementById('coupons-list');
        cl.innerHTML = coupons.map((c, i) => `
          <div class="coupon-row">
            <input type="text" value="${c.code || ''}" placeholder="Kod" onchange="setCoupon(${i},'code',this.value)">
            <input type="number" value="${c.discount || 0}" placeholder="Değer" onchange="setCoupon(${i},'discount',this.value)">
            <select onchange="setCoupon(${i},'type',this.value)">
              <option ${c.type === 'percent' ? 'selected' : ''}>percent</option>
              <option ${c.type === 'fixed' ? 'selected' : ''}>fixed</option>
            </select>
            <input type="text" value="${c.description || ''}" placeholder="Açıklama" onchange="setCoupon(${i},'description',this.value)">
            <button class="btn" style="background:#dc2626;color:#fff" onclick="removeCoupon(${i})">Sil</button>
          </div>
        `).join('');
      } catch (e) {}
    }

    function setCoupon(i, field, val) {
      if (!restaurantData.coupons) restaurantData.coupons = [];
      if (!restaurantData.coupons[i]) restaurantData.coupons[i] = {};
      restaurantData.coupons[i][field] = field === 'discount' ? Number(val) || 0 : val;
    }

    function addCoupon() {
      if (!restaurantData.coupons) restaurantData.coupons = [];
      restaurantData.coupons.push({ code: '', discount: 0, type: 'percent', description: '' });
      loadRestaurantForm();
    }

    function removeCoupon(i) {
      restaurantData.coupons?.splice(i, 1);
      loadRestaurantForm();
    }

    async function saveRestaurant() {
      restaurantData.name = document.getElementById('r-name').value;
      restaurantData.address = document.getElementById('r-address').value;
      restaurantData.phone = document.getElementById('r-phone').value;
      restaurantData.hoursOpen = document.getElementById('r-hoursOpen').value;
      restaurantData.hoursClose = document.getElementById('r-hoursClose').value;
      restaurantData.minOrderAmount = Number(document.getElementById('r-minOrder').value) || 0;
      restaurantData.estimatedMinutes = Number(document.getElementById('r-estMinutes').value) || 25;
      restaurantData.hours = `${restaurantData.hoursOpen} - ${restaurantData.hoursClose}`;
      try {
        const r = await fetch('/api/restaurant', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(restaurantData)
        });
        const d = await r.json();
        alert(d.ok ? 'Ayarlar kaydedildi.' : (d.error || 'Hata'));
      } catch (e) { alert('Kayıt başarısız'); }
    }

    async function loadStats() {
      const today = orders.filter(o => isToday(o.createdAt));
      document.getElementById('stat-total-orders').textContent = orders.length;
      document.getElementById('stat-total-revenue').textContent = orders.reduce((s, o) => s + o.total, 0) + '₺';
      document.getElementById('stat-today-orders').textContent = today.length;
      document.getElementById('stat-today-revenue').textContent = today.reduce((s, o) => s + o.total, 0) + '₺';
      try {
        const r = await fetch('/api/admin/stats');
        const d = await r.json();
        document.getElementById('stat-favorites').textContent = d.favoritesCount || 0;
      } catch { document.getElementById('stat-favorites').textContent = '-'; }
      const statuses = ['Alındı', 'Hazırlanıyor', 'Hazır', 'Yola Çıktı', 'Teslim Edildi', 'İptal'];
      const byStatus = statuses.map(s => ({ s, c: orders.filter(o => o.status === s).length }));
      document.getElementById('status-breakdown').innerHTML = byStatus.map(x =>
        `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span>${x.s}</span><span>${x.c}</span></div>`
      ).join('');
    }

    loadOrders();
    setInterval(loadOrders, 4000);
  </script>
</body>
</html>
